services:
  - type: web
    name: Diabeatit-Companion
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 1 wsgi:app
    autoDeploy: true
    healthCheckPath: /
    instanceType: free
    envVars:
      - key: DB_HOST
      - key: DB_USER
      - key: DB_PASSWORD
      - key: DB_NAME
      - key: DB_PORT
      - key: PUSH_VAPID_PUBLIC_KEY
      - key: PUSH_VAPID_PRIVATE_KEY
      - key: PUSH_VAPID_CLAIMS_SUBJECT
      - key: SECRET_KEY
      - key: FIELD_ENCRYPTION_KEY
      - key: BREVO_API_KEY
      - key: ENFORCE_HTTPS
      - key: TRUST_PROXY_HEADERS
      - key: CORS_ALLOWED_ORIGINS
      - key: ADMIN_EMAIL
      - key: ADMIN_PASSWORD
